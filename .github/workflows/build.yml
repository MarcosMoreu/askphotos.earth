name: Build Cross-Platform Apps
on: [push]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Libraries
        run: |
          pip install customtkinter Pillow requests exifread google-genai pyinstaller

      - name: Build App
        run: |
          python -m PyInstaller --onefile --noconsole --collect-all customtkinter --name "AskPhotosDotEarthConverter" generate_map.py

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Converter-${{ matrix.os }}
          path: dist/*
